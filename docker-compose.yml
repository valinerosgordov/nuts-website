name: nuts

services:
  nuts-api:
    build: .
    container_name: nuts-api
    restart: unless-stopped
    expose:
      - "5100"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Data Source=/app/data/nuts.db"
      Jwt__Issuer: ${JWT_ISSUER:-NutsApi}
      Jwt__Audience: ${JWT_AUDIENCE:-NutsAdmin}
      # REQUIRED — generate with: openssl rand -base64 48
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      # REQUIRED in Production — comma-separated list of allowed origins
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS must be set in .env}
      # REQUIRED — PBKDF2 hash in format "salt:hash" (use: dotnet run -- hash-password)
      Admin__Username: ${ADMIN_USERNAME:-admin}
      Admin__PasswordHash: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH must be set in .env}
      MoySklad__Token: ${MOYSKLAD_TOKEN:-}
      Observability__OtlpEndpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      - nuts-data:/app/data
      - nuts-uploads:/app/wwwroot/uploads
    networks:
      - nuts-network

  nginx:
    image: nginx:alpine
    container_name: nuts-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./proxy_common.conf:/etc/nginx/conf.d/proxy_common.conf:ro
      - nuts-uploads:/var/www/uploads:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
    depends_on:
      nuts-api:
        condition: service_healthy
    networks:
      - nuts-network

  certbot:
    image: certbot/certbot
    container_name: nuts-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - nginx

volumes:
  nuts-data:
  nuts-uploads:
  certbot-etc:
  certbot-var:

networks:
  nuts-network:
    driver: bridge
