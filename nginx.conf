map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Global rate limit zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_strict:10m  rate=5r/s;

server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
        default_type "text/plain";
    }

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml+rss
        image/svg+xml font/woff2;

    # Hide server version
    server_tokens off;

    # Security headers (defense-in-depth; SPA may need CSP tuning)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    # Enable HSTS only once HTTPS is active; commented until certbot runs:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # User-uploaded images served directly from volume (bypasses API)
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Long-lived static assets
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?|webp)$ {
        proxy_pass http://nuts-api:5100;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Stricter limit for auth and form submissions
    location ~ ^/api/(auth|contacts|orders|promo/validate) {
        limit_req zone=api_strict burst=10 nodelay;
        proxy_pass http://nuts-api:5100;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    # Everything else
    location / {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass http://nuts-api:5100;
        include /etc/nginx/conf.d/proxy_common.conf;
    }
}
